name: QA Experiment — Test & Report

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Run Tests & Generate Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ── 3. Cache ─────────────────────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Playwright ─────────────────────────────────────────────────────────
      - name: Install Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      # ── 6. Start Flask ────────────────────────────────────────────────────────
      - name: Start Flask app
        run: |
          python app.py &
          echo "Waiting for Flask to start..."
          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:5000 > /dev/null; then
              echo "Flask is up after ${i}s"
              break
            fi
            echo "Still waiting... (${i}s)"
            sleep 1
          done

      # ── 7. Run tests ──────────────────────────────────────────────────────────
      - name: Run pytest
        run: |
          mkdir -p reports
          pytest tests/ --tb=short -v 2>&1 | tee reports/pytest-output.txt
        continue-on-error: true

      # ── 8. Claude AI — Analyse failures ──────────────────────────────────────
      - name: Analyse failures with Claude
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python analyze_failures.py

      # ── 9. Job summary ────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🧪 Test Report — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -30 reports/pytest-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # ── 10. Upload report ──────────────────────────────────────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: |
            reports/report.html
            reports/pytest-output.txt
          retention-days: 30

      # ── 11. Upload Playwright artifacts on failure ────────────────────────────
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_number }}
          path: test-results/
          retention-days: 7